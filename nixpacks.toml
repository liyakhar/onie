[phases.setup]
# Pin nixpkgs for Node 22.13.1 — Prisma 7 needs Node >=22.12
nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"
nixPkgs = ["nodejs_22", "pnpm-9_x"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm exec prisma generate",
  "pnpm run build"
]

[start]
cmd = "pnpm exec prisma db push && pnpm run start"
